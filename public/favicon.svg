<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#a85246"/>
  
  <!-- Gauge icon (lucide style) -->
  <g fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer circle (gauge dial) -->
    <circle cx="50" cy="55" r="30"/>
    
    <!-- Arc (gauge range) -->
    <path d="M 23 55 A 27 27 0 0 1 77 55"/>
    
    <!-- Center dot -->
    <circle cx="50" cy="55" r="3" fill="white"/>
    
    <!-- Needle pointing to mid-right -->
    <line x1="50" y1="55" x2="65" y2="40" stroke-width="2"/>
    
    <!-- Tick marks -->
    <line x1="23" y1="55" x2="20" y2="55"/>
    <line x1="50" y1="27" x2="50" y2="24"/>
    <line x1="77" y1="55" x2="80" y2="55"/>
  </g>
</svg>
